<section>
    <h2 class="section-title">Contact Us</h2>

    <div class="menu" style="max-width:1000px; margin:auto;">
        
        <!-- Contact Info -->
        <div class="menu-card">
            <h3>📍 Visit Us</h3>
            <p>Café Aroma<br>
               MG Road, Indore<br>
               Madhya Pradesh</p>
            <p><strong>🕒 Timings:</strong><br> 9:00 AM – 10:00 PM</p>
        </div>

        <div class="menu-card">
            <h3>📞 Get in Touch</h3>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Email:</strong> cafearoma@gmail.com</p>
            <p><strong>Instagram:</strong> @cafearoma</p>
        </div>

        <!-- Contact Form -->
        <div class="menu-card">
            <h3>✉️ Send Message</h3>
            <form>
                <input type="text" placeholder="Your Name" required style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="email" placeholder="Your Email" required style="width:100%; padding:10px; margin-bottom:10px;">
                <textarea placeholder="Your Message" rows="4" style="width:100%; padding:10px; margin-bottom:10px;"></textarea>
                <button type="submit" style="
                    width:100%;
                    padding:10px;
                    background:#ff9800;
                    border:none;
                    color:#000;
                    font-size:16px;
                    border-radius:5px;
                    cursor:pointer;">
                    Send Message
                </button>
            </form>
        </div>

    </div>

    <!-- Rating Section -->
    <div style="max-width:600px; margin:60px auto 0; text-align:center;">
        <h3 style="color:#3e2723; margin-bottom:15px;">Rate Your Experience</h3>

        <form>
            <div style="font-size:30px; margin-bottom:15px;">
                ⭐ ⭐ ⭐ ⭐ ⭐
            </div>

            <select style="padding:10px; width:100%; margin-bottom:15px;">
                <option value="">Select Rating</option>
                <option>⭐ 1 - Very Bad</option>
                <option>⭐⭐ 2 - Bad</option>
                <option>⭐⭐⭐ 3 - Average</option>
                <option>⭐⭐⭐⭐ 4 - Good</option>
                <option>⭐⭐⭐⭐⭐ 5 - Excellent</option>
            </select>

            <textarea placeholder="Leave a review (optional)" rows="3"
                style="width:100%; padding:10px; margin-bottom:15px;"></textarea>

            <button type="submit" style="
                padding:10px 30px;
                background:#3e2723;
                color:#fff;
                border:none;
                border-radius:5px;
                cursor:pointer;">
                Submit Rating
            </button>
        </form>
    </div>
</section>
